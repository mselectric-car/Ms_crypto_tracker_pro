name: Build Crypto APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create project
        run: flutter create generated_app --platforms=android --org com.mstech --project-name ms_crypto_tracker_pro

      - name: Copy files
        run: cp main.dart generated_app/lib/main.dart && cp pubspec.yaml generated_app/pubspec.yaml

      - name: Add internet permission
        run: sed -i '2i\    <uses-permission android:name="android.permission.INTERNET" />' generated_app/android/app/src/main/AndroidManifest.xml

      - name: Install packages
        run: cd generated_app && flutter pub get

      - name: Build APK
        run: cd generated_app && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MS-Crypto-Tracker-Pro-APK
          path: generated_app/build/app/outputs/flutter-apk/app-release.apk
